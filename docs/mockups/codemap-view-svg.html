<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CodeMap SVG prototype — ELK + SVG direct render</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://unpkg.com/elkjs@0.11.1/lib/elk.bundled.js"></script>

<style>
  :root {
    --vs-bg:        #1e1e1e;
    --vs-panel:     #252526;
    --vs-border:    #333;
    --bc-capture:   #4ec9b0;
    --bc-recall:    #c586c0;
    --bc-host:      #dcdcaa;
    --bc-shared:    #569cd6;
    --text:         #d4d4d4;
    --dim:          #858585;
    --edge:         #c0c8d2;
    --edge-dim:     #9aa4b0;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    background: var(--vs-bg);
    color: var(--text);
    font-family: 'SF Mono', Menlo, Consolas, monospace;
    font-size: 13px;
    overflow: hidden;
  }
  header {
    padding: 8px 14px;
    background: var(--vs-panel);
    border-bottom: 1px solid var(--vs-border);
    display: flex;
    align-items: center;
    gap: 14px;
  }
  header h1 { font-size: 13px; font-weight: 600; margin: 0; }
  header .note { color: var(--dim); font-size: 11px; }
  header .legend { display: flex; gap: 10px; margin-left: auto; }
  .legend-item { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; color: var(--dim); }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; }
  .legend-dot.host    { background: var(--bc-host); }
  .legend-dot.capture { background: var(--bc-capture); }
  .legend-dot.recall  { background: var(--bc-recall); }
  .legend-dot.shared  { background: var(--bc-shared); }

  #canvas { width: 100vw; height: calc(100vh - 38px); display: block; cursor: grab; user-select: none; }
  #canvas.dragging { cursor: grabbing; }

  .compound       { fill: rgba(255,255,255,0.015); stroke-width: 2.2; rx: 14; ry: 14; }
  .compound.host    { stroke: var(--bc-host); }
  .compound.capture { stroke: var(--bc-capture); }
  .compound.recall  { stroke: var(--bc-recall); }
  .compound.shared  { stroke: var(--bc-shared); }

  .compound-label-bg {
    fill: var(--vs-panel);
    stroke: var(--vs-border);
    stroke-width: 1;
    rx: 4; ry: 4;
  }
  .compound-label {
    font-size: 12px; font-weight: 600;
  }
  .compound-label.host    { fill: var(--bc-host); }
  .compound-label.capture { fill: var(--bc-capture); }
  .compound-label.recall  { fill: var(--bc-recall); }
  .compound-label.shared  { fill: var(--bc-shared); }

  .method {
    fill: rgba(255,255,255,0.025);
    stroke: rgba(192,200,210,0.32);
    stroke-width: 1.2;
    rx: 10; ry: 10;
  }
  .method-label {
    fill: var(--text);
    font-size: 11px;
    font-family: inherit;
    dominant-baseline: middle;
  }

  .edge {
    fill: none;
    stroke: var(--edge);
    stroke-width: 1.8;
    stroke-linejoin: round;
    stroke-linecap: round;
  }
</style>
</head>
<body>

<header>
  <h1>CodeMap SVG prototype</h1>
  <span class="note">ELK layout → direct SVG render · drag pan · wheel zoom</span>
  <div class="legend">
    <span class="legend-item"><span class="legend-dot host"></span>host</span>
    <span class="legend-item"><span class="legend-dot capture"></span>capture</span>
    <span class="legend-item"><span class="legend-dot recall"></span>recall</span>
    <span class="legend-item"><span class="legend-dot shared"></span>shared</span>
  </div>
</header>

<svg id="canvas" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#c0c8d2"/>
    </marker>
  </defs>
  <g id="viewport"></g>
</svg>

<script>
// ============================================================
//  Data — copy of CLASSES from codemap-view.html (lines 1195-1455,
//  snapshot 2026-05-26). Keep in sync manually for the prototype.
// ============================================================
const CLASSES = [
  // ---- Host ----
  {
    id: 'Program', bc: 'host',
    methods: [
      { name: 'Main', calls: ['Program.ConfigureModules', 'Program.MapAllModuleEndpoints'] },
      { name: 'ConfigureModules' },
      { name: 'MapAllModuleEndpoints',
        calls: ['CaptureEndpoints.MapCaptureEndpoints', 'RecallEndpoints.MapRecallEndpoints'] },
    ],
  },

  // ---- Capture ----
  {
    id: 'CaptureEndpoints', bc: 'capture',
    methods: [
      { name: 'MapCaptureEndpoints' },
      { name: 'IngestUrl', calls: ['IngestUrlHandler.EnqueueAsync'] },
      { name: 'List', calls: ['CaptureJobStore.FindInFlightByCanonicalUrlAsync'] },
      { name: 'GetJob', calls: ['CaptureJobStore.MarkSucceededAsync'] },
    ],
  },
  {
    id: 'IngestUrlHandler', bc: 'capture',
    methods: [
      { name: 'EnqueueAsync',
        calls: ['CaptureJobStore.InsertAsync', 'CaptureJobStore.FindInFlightByCanonicalUrlAsync'] },
      { name: 'ExecuteAsync',
        calls: ['HtmlContentExtractor.ExtractAsync', 'OnnxEmbeddingService.EmbedDocumentAsync',
                'EventStore.InsertAsync', 'EventChunkStore.InsertRangeAsync',
                'CaptureJobStore.MarkSucceededAsync', 'CaptureJobStore.MarkFailedAsync',
                'CaptureJobStore.RescheduleAsync'] },
    ],
  },
  {
    id: 'CaptureJobWorker', bc: 'capture',
    methods: [
      { name: 'StartAsync', calls: ['CaptureJobStore.ResetStuckProcessingAsync'] },
      { name: 'ExecuteAsync', calls: ['CaptureJobWorker.TickOnceAsync'] },
      { name: 'TickOnceAsync',
        calls: ['CaptureJobStore.ClaimNextPendingAsync', 'IngestUrlHandler.ExecuteAsync'] },
    ],
  },
  {
    id: 'EventStore', bc: 'capture',
    methods: [ { name: 'InsertAsync' }, { name: 'GetByIdAsync' } ],
  },
  {
    id: 'EventChunkStore', bc: 'capture',
    methods: [ { name: 'InsertRangeAsync' } ],
  },
  {
    id: 'CaptureJobStore', bc: 'capture',
    methods: [
      { name: 'InsertAsync' },
      { name: 'FindInFlightByCanonicalUrlAsync' },
      { name: 'ClaimNextPendingAsync' },
      { name: 'MarkSucceededAsync' },
      { name: 'RescheduleAsync' },
      { name: 'MarkFailedAsync' },
      { name: 'ResetStuckProcessingAsync' },
    ],
  },

  // ---- Recall ----
  {
    id: 'RecallEndpoints', bc: 'recall',
    methods: [
      { name: 'MapRecallEndpoints' },
      { name: 'Search', calls: ['RecallByQueryHandler.HandleAsync'] },
      { name: 'Ask',    calls: ['AskByQueryHandler.HandleAsync'] },
    ],
  },
  {
    id: 'RecallByQueryHandler', bc: 'recall',
    methods: [
      { name: 'HandleAsync',
        calls: ['OnnxEmbeddingService.EmbedQueryAsync', 'RecallQuery.SearchAsync',
                'RecallByQueryHandler.ParsePayload'] },
      { name: 'ParsePayload' },
    ],
  },
  {
    id: 'AskByQueryHandler', bc: 'recall',
    methods: [
      { name: 'HandleAsync',
        calls: ['OnnxEmbeddingService.EmbedQueryAsync', 'RecallQuery.SearchAsync',
                'OllamaLlmService.ChatAsync', 'AskByQueryHandler.ExtractReferencedIndices'] },
      { name: 'ExtractReferencedIndices' },
    ],
  },
  {
    id: 'RecallQuery', bc: 'recall',
    methods: [ { name: 'SearchAsync' } ],
  },

  // ---- Shared ----
  {
    id: 'OnnxEmbeddingService', bc: 'shared',
    methods: [
      { name: 'EmbedQueryAsync',
        calls: ['OnnxEmbeddingService.ApplyPrefix', 'OnnxEmbeddingService.EmbedSync'] },
      { name: 'EmbedDocumentAsync',
        calls: ['OnnxEmbeddingService.ApplyPrefix', 'OnnxEmbeddingService.EmbedSync'] },
      { name: 'EmbedSync' },
      { name: 'ApplyPrefix' },
    ],
  },
  {
    id: 'OllamaLlmService', bc: 'shared',
    methods: [
      { name: 'ChatAsync',
        calls: ['OllamaLlmService.MapOllamaResponse', 'OllamaLlmService.StripThinkBlock'] },
      { name: 'StripThinkBlock' },
      { name: 'MapOllamaResponse' },
    ],
  },
  {
    id: 'HtmlContentExtractor', bc: 'shared',
    methods: [
      { name: 'ExtractAsync',
        calls: ['HtmlContentExtractor.AssertHostIsPublicAsync',
                'HtmlContentExtractor.BuildExtractorId'] },
      { name: 'AssertHostIsPublicAsync' },
      { name: 'BuildExtractorId' },
    ],
  },
];

// ============================================================
//  Build ELK graph
// ============================================================
const METHOD_W = 250;
const METHOD_H = 32;
const COMPOUND_PAD = { top: 36, left: 14, right: 14, bottom: 14 };

const methodIds = new Set();
CLASSES.forEach(c => c.methods.forEach(m => methodIds.add(`${c.id}.${m.name}`)));

const elkChildren = CLASSES.map(c => ({
  id: c.id,
  bc: c.bc,
  layoutOptions: {
    'elk.padding': `[top=${COMPOUND_PAD.top},left=${COMPOUND_PAD.left},right=${COMPOUND_PAD.right},bottom=${COMPOUND_PAD.bottom}]`,
  },
  children: c.methods.map(m => ({
    id: `${c.id}.${m.name}`,
    width: METHOD_W,
    height: METHOD_H,
    labels: [{ text: `+ ${m.name}()` }],
  })),
}));

const elkEdges = [];
let edgeCounter = 0;
CLASSES.forEach(c => {
  c.methods.forEach(m => {
    (m.calls || []).forEach(target => {
      const source = `${c.id}.${m.name}`;
      if (source === target) return;
      if (!methodIds.has(target)) return;
      elkEdges.push({
        id: `e${edgeCounter++}`,
        sources: [source],
        targets: [target],
      });
    });
  });
});

const elkGraph = {
  id: 'root',
  layoutOptions: {
    'elk.algorithm': 'layered',
    'elk.direction': 'RIGHT',
    'elk.edgeRouting': 'ORTHOGONAL',
    'elk.hierarchyHandling': 'INCLUDE_CHILDREN',
    'elk.layered.spacing.nodeNodeBetweenLayers': '100',
    'elk.spacing.nodeNode': '44',
    'elk.spacing.edgeNode': '20',
    'elk.spacing.edgeEdge': '12',
    'elk.layered.spacing.edgeNodeBetweenLayers': '24',
    'elk.layered.spacing.edgeEdgeBetweenLayers': '14',
    'elk.layered.nodePlacement.strategy': 'NETWORK_SIMPLEX',
    'elk.layered.unnecessaryBendpoints': 'true',
    'elk.layered.crossingMinimization.strategy': 'LAYER_SWEEP',
    'elk.layered.crossingMinimization.greedySwitch.type': 'TWO_SIDED',
  },
  children: elkChildren,
  edges: elkEdges,
};

// ============================================================
//  Render
// ============================================================
const SVG_NS = 'http://www.w3.org/2000/svg';
const viewport = document.getElementById('viewport');
const canvas = document.getElementById('canvas');
const CORNER_RADIUS = 10;

const elk = new ELK();

elk.layout(elkGraph)
  .then(result => {
    // Build nodeId -> absolute position map (used for edge LCA offset).
    const nodeAbs = new Map();
    nodeAbs.set('root', { x: 0, y: 0 });
    (function walk(node, px, py) {
      const ax = px + (node.x || 0);
      const ay = py + (node.y || 0);
      if (node.id && node.id !== 'root') nodeAbs.set(node.id, { x: ax, y: ay });
      (node.children || []).forEach(c => walk(c, ax, ay));
    })(result, 0, 0);

    // Render order: containers first (background), then methods, then edges (top)
    drawContainers(result, 0, 0);
    drawMethods(result, 0, 0);
    drawEdges(result, nodeAbs);
    fitToContent(result);
  })
  .catch(err => {
    console.error('[ELK] layout failed:', err);
  });

function drawContainers(elkNode, parentX, parentY) {
  const absX = parentX + (elkNode.x || 0);
  const absY = parentY + (elkNode.y || 0);

  if (elkNode.id !== 'root' && elkNode.children && elkNode.children.length > 0) {
    const bc = elkNode.bc || 'shared';

    const rect = document.createElementNS(SVG_NS, 'rect');
    rect.setAttribute('x', absX);
    rect.setAttribute('y', absY);
    rect.setAttribute('width', elkNode.width);
    rect.setAttribute('height', elkNode.height);
    rect.setAttribute('class', `compound ${bc}`);
    viewport.appendChild(rect);

    // Label sits on top edge — render a small filled rect behind it so
    // the stroke breaks for it visually.
    const text = elkNode.id;
    const labelW = text.length * 7.2 + 18;
    const labelH = 18;
    const labelX = absX + 16;
    const labelY = absY - labelH / 2;

    const labelBg = document.createElementNS(SVG_NS, 'rect');
    labelBg.setAttribute('x', labelX);
    labelBg.setAttribute('y', labelY);
    labelBg.setAttribute('width', labelW);
    labelBg.setAttribute('height', labelH);
    labelBg.setAttribute('class', 'compound-label-bg');
    viewport.appendChild(labelBg);

    const label = document.createElementNS(SVG_NS, 'text');
    label.setAttribute('x', labelX + 9);
    label.setAttribute('y', labelY + 13);
    label.setAttribute('class', `compound-label ${bc}`);
    label.textContent = text;
    viewport.appendChild(label);
  }

  (elkNode.children || []).forEach(c => drawContainers(c, absX, absY));
}

function drawMethods(elkNode, parentX, parentY) {
  const absX = parentX + (elkNode.x || 0);
  const absY = parentY + (elkNode.y || 0);

  if (elkNode.id !== 'root' && (!elkNode.children || elkNode.children.length === 0)) {
    const rect = document.createElementNS(SVG_NS, 'rect');
    rect.setAttribute('x', absX);
    rect.setAttribute('y', absY);
    rect.setAttribute('width', elkNode.width);
    rect.setAttribute('height', elkNode.height);
    rect.setAttribute('class', 'method');
    viewport.appendChild(rect);

    const labelText = (elkNode.labels && elkNode.labels[0] && elkNode.labels[0].text) || elkNode.id;
    const label = document.createElementNS(SVG_NS, 'text');
    label.setAttribute('x', absX + 12);
    label.setAttribute('y', absY + elkNode.height / 2);
    label.setAttribute('class', 'method-label');
    label.textContent = labelText;
    viewport.appendChild(label);
  }

  (elkNode.children || []).forEach(c => drawMethods(c, absX, absY));
}

// ELK outputs each edge's section coordinates in the LCA container's
// local frame, regardless of which `edges[]` list the edge appears in.
// So we resolve the LCA from source/target and use *its* absolute
// position as the offset.
function drawEdges(elkNode, nodeAbs) {
  function walk(node) {
    (node.edges || []).forEach(e => {
      const src = e.sources && e.sources[0];
      const tgt = e.targets && e.targets[0];
      const lca = lcaContainerId(src, tgt);
      const off = nodeAbs.get(lca) || { x: 0, y: 0 };
      drawEdgePath(e, off.x, off.y);
    });
    (node.children || []).forEach(walk);
  }
  walk(elkNode);
}

// In this graph every method id is `${compound}.${method}`. The LCA
// container is therefore the shared `${compound}` prefix when source
// and target sit in the same compound, otherwise the root.
function lcaContainerId(source, target) {
  if (!source || !target) return 'root';
  const sParent = source.includes('.') ? source.split('.')[0] : null;
  const tParent = target.includes('.') ? target.split('.')[0] : null;
  return sParent && sParent === tParent ? sParent : 'root';
}

function drawEdgePath(elkEdge, ox, oy) {
  if (!elkEdge.sections || elkEdge.sections.length === 0) return;
  const s = elkEdge.sections[0];
  const pts = [
    { x: s.startPoint.x + ox, y: s.startPoint.y + oy },
    ...(s.bendPoints || []).map(b => ({ x: b.x + ox, y: b.y + oy })),
    { x: s.endPoint.x + ox, y: s.endPoint.y + oy },
  ];

  const path = document.createElementNS(SVG_NS, 'path');
  path.setAttribute('d', polylineToRoundedPath(pts, CORNER_RADIUS));
  path.setAttribute('class', 'edge');
  path.setAttribute('marker-end', 'url(#arrow)');
  viewport.appendChild(path);
}

// Convert a polyline [p0, p1, ..., pn] into an SVG path with each
// interior corner replaced by a quadratic curve of radius `r`.
function polylineToRoundedPath(pts, r) {
  if (pts.length < 2) return '';
  if (pts.length === 2) {
    return `M ${pts[0].x} ${pts[0].y} L ${pts[1].x} ${pts[1].y}`;
  }
  const cmds = [`M ${fmt(pts[0].x)} ${fmt(pts[0].y)}`];
  for (let i = 1; i < pts.length - 1; i++) {
    const a = pts[i - 1], b = pts[i], c = pts[i + 1];
    const d1 = Math.hypot(b.x - a.x, b.y - a.y);
    const d2 = Math.hypot(c.x - b.x, c.y - b.y);
    const rad = Math.min(r, d1 / 2, d2 / 2);
    if (rad < 0.5) {
      cmds.push(`L ${fmt(b.x)} ${fmt(b.y)}`);
      continue;
    }
    const t1 = { x: b.x - (b.x - a.x) * rad / d1, y: b.y - (b.y - a.y) * rad / d1 };
    const t2 = { x: b.x + (c.x - b.x) * rad / d2, y: b.y + (c.y - b.y) * rad / d2 };
    cmds.push(`L ${fmt(t1.x)} ${fmt(t1.y)}`);
    cmds.push(`Q ${fmt(b.x)} ${fmt(b.y)} ${fmt(t2.x)} ${fmt(t2.y)}`);
  }
  const last = pts[pts.length - 1];
  cmds.push(`L ${fmt(last.x)} ${fmt(last.y)}`);
  return cmds.join(' ');
}

function fmt(n) { return Math.round(n * 10) / 10; }

// ============================================================
//  Pan / zoom (viewBox-driven)
// ============================================================
let vb = { x: 0, y: 0, w: 1200, h: 800 };

function syncViewBox() {
  canvas.setAttribute('viewBox', `${vb.x} ${vb.y} ${vb.w} ${vb.h}`);
}

function fitToContent(result) {
  const w = (result.width || 1000) + 80;
  const h = (result.height || 700) + 80;
  vb = { x: -40, y: -40, w, h };
  syncViewBox();
}

let dragging = false, dragLastX = 0, dragLastY = 0;
canvas.addEventListener('mousedown', e => {
  dragging = true;
  dragLastX = e.clientX;
  dragLastY = e.clientY;
  canvas.classList.add('dragging');
});
window.addEventListener('mouseup', () => {
  dragging = false;
  canvas.classList.remove('dragging');
});
window.addEventListener('mousemove', e => {
  if (!dragging) return;
  const rect = canvas.getBoundingClientRect();
  const dx = (e.clientX - dragLastX) * (vb.w / rect.width);
  const dy = (e.clientY - dragLastY) * (vb.h / rect.height);
  vb.x -= dx;
  vb.y -= dy;
  dragLastX = e.clientX;
  dragLastY = e.clientY;
  syncViewBox();
});

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  // mouse position in SVG world coords
  const sx = vb.x + (mx / rect.width) * vb.w;
  const sy = vb.y + (my / rect.height) * vb.h;
  const factor = e.deltaY > 0 ? 1.15 : 1 / 1.15;
  vb.w *= factor;
  vb.h *= factor;
  // re-anchor so mouse stays over the same world point
  vb.x = sx - (mx / rect.width) * vb.w;
  vb.y = sy - (my / rect.height) * vb.h;
  syncViewBox();
}, { passive: false });
</script>
</body>
</html>
