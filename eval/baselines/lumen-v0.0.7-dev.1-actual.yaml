    docComment: |-
      对话型 LLM 抽象。

      由 Recall grounded ask、未来的联想 / 立场抽取 / 摘要等 LLM-using 链路共享。
      单方法 `ChatAsync` 承载「我有一组消息，给我答案」这一最普适形态。


      接口形态由 ADR-017 决定：
      <list type="bullet">
        <item>`ChatOptions.Model` 为 Phase 1.5 多模型路由预留——
          Phase 1 实现层 ignored 但接口保留，未来不同 caller 传不同 model id 不需改接口。</item>
        <item>`ChatResult.ReasoningTrace` 为切换到推理模型（如 DeepSeek-R1-Distill）预留——
          非推理模型实现层固定为 <c>null</c>。</item>
        <item>`ChatResult.FinishReason` 让 caller 能区分"模型主动收尾"和"超 max_tokens 被砍"，
