          ROC AUC via the Mann-Whitney U statistic. Handles ties by averaging ranks.
          Returns 0.5 for degenerate cases (all positives or all negatives).
          Implementation: rank all scores ascending with mid-rank for ties; AUC =
          (sum_of_ranks_of_positives - n_pos * (n_pos + 1) / 2) / (n_pos * n_neg).
