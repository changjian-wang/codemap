      让上游 capture 退化到 URL-only embedding,直接拖累 enrichment / association /
      retrieval 三层质量(见手测 2026-05-13: 3 个真 URL 全部 length=0)。


      本兜底**不是**第二个 Readability。它只做"把信息密度最高的容器节点交出来",
      由 ReverseMarkdown 完成 HTML→Markdown 转换。它放弃了"段落评分 / 候选合并"
      这类启发式,换取在结构化 wiki / 文档型站点上的稳定性。
