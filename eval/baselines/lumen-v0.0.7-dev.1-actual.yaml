rootIntent: "Composition root for the Lumen API host: registers modules, middleware, and maps endpoints."
narrative: Start here to understand how the Lumen API process is assembled. Program.cs builds the ASP.NET Core host, registers persistence/embedding/LLM/extraction infrastructure plus the Capture/Memory/Connect/Recall/Identity modules, wires in-process domain events across module assemblies, configures a dev-only CORS policy, installs the global exception handler, runs migrations, and finally maps the module endpoint extensions before running the app. Follow the `Add*Module` and `Map*Endpoints` calls outward to reach each feature slice.
