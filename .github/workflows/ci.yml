name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build
      - run: npm test
      - run: npx --yes @vscode/vsce@latest package --out codemap.vsix

      - uses: actions/upload-artifact@v4
        with:
          name: codemap-vsix
          path: codemap.vsix
          if-no-files-found: error
