        externalCalls: []
        docComment: |-
          ADR-029 Layer 3 read entry: given candidate event ids from a Recall
          chunk-vector search, returns the subset that are currently the live
          capture for some URL (i.e. exist as <c>event_id</c> in
          <c>event_current_by_url</c>). Recall uses this as an in-list filter to
          dedup top-K results that originate from multiple captures of the same URL.

          Returns event ids in unspecified order — caller must intersect with
          its own score-ordered candidate list.

          Empty input returns empty output without a round-trip.

