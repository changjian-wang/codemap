    docComment: |-
      Pure functions for pair-wise association classification metrics.

      Treats the fusion <c>score</c> as a continuous predictor and the gold label
      (<c>should-link</c> = positive, <c>shouldnt-link</c> = negative; <c>unsure</c> pairs
      must be excluded by the caller) as the ground truth. Provides:
      <list type="bullet">
        <item>`F1AtThreshold(IReadOnlyList{double}, IReadOnlyList{bool}, double)` —
              classification metric at a chosen cutoff.</item>
        <item>`BestThresholdSweep(IReadOnlyList{double}, IReadOnlyList{bool})` —
              picks the threshold (over all observed scores) that maximizes F1; used to
              report the "best you can do today" without committing to a production cutoff.</item>
        <item>`RocAuc(IReadOnlyList{double}, IReadOnlyList{bool})` —
              threshold-free ranking quality; robust to score scale changes between
              candidate algorithms (X1 / X2 / X3 may emit very different score ranges).</item>
      </list>


      Implementation notes:
      <list type="bullet">
        <item>Ties are handled with greater-or-equal predicate at threshold; AUC uses the
              Mann-Whitney U formulation which averages tied ranks, so it's the canonical
              AUC even when many pairs share the same score (likely with the current
              Jaccard-based formula where many pairs land at 0).</item>
        <item>All functions reject mismatched array lengths via
              `ArgumentException` — silent truncation would produce subtly wrong
              metrics and we'd debug a phantom regression.</item>
      </list>
