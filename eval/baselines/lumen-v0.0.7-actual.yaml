      由 Recall grounded ask、未来的联想 / 立场抽取 / 摘要等 LLM-using 链路共享。
      单方法 `ChatAsync` 承载「我有一组消息，给我答案」这一最普适形态。


      接口形态由 ADR-017 决定：
      <list type="bullet">
        <item>`ChatOptions.Model` 为 Phase 1.5 多模型路由预留——
