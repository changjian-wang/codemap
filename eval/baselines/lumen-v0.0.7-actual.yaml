rootIntent: ASP.NET Core host program that boots the Lumen API and registers all module services, middleware, and root routes.
narrative: "Read Program.cs first: it composes the application by registering persistence, embeddings, LLM, extraction, identity, capture, memory, connect, and recall modules. It wires global exception handling, dev-only CORS, runs migrations, exposes a liveness probe at /health, and delegates feature routes to module-specific Map*Endpoints extensions. Follow any AddXxxModule or MapXxxEndpoints call to drill into the corresponding module."
