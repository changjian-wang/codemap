      One pair-wise gold assertion used by the <c>association-pairs</c> dataset kind.

      Each pair references two items from the shared top-level `DatasetSpec.Corpus`
      by their case-local `CorpusItemSpec.Id`. The eval runner computes a fusion
      score (per ADR-020 §E1) for the pair and compares it to the `Expected`
      label.


      Pairs are undirected for the fusion math (Jaccard and cosine are symmetric; the
      stance signal is a 2x2 lookup). Source/target order in the YAML is therefore
      authorial preference only and does not affect scoring.
