          fetches candidate <c>(event_id, score)</c> pairs from chunk-vector search,
          calls this method to intersect with currents, then fetches event rows by
          id. Decoupling the JOIN keeps Recall's pgvector query plan small and
          preserves Capture-owned schema invariants behind this PublicApi.
